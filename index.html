/* ── Helpers ── */
const fmt = n => n.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const padNum = n => String(n+1).padStart(4,"0");

}
function saveOrders(o) {

}

/* ── CSV Export ── */
function exportCSV(orders) {
  if(!orders.length) return alert("Aucune commande à exporter.");
  const rows = [["Commande","Date","Heure","Articles","Total (€)","Paiement","Rendu (€)"]];
  orders.forEach(o => rows.push([
    "#"+o.num, o.date, o.time,
    o.items.map(i=>i.name+" x"+i.qty).join(" | "),
    o.total.toFixed(2).replace(".",","),
    o.paymentLabel.replace(/[^\w\s]/g,"").trim(),
    o.paymentMode==="cash"?(o.cashGiven-o.total).toFixed(2).replace(".",","):""
  ]));
  rows.push([],[" RÉSUMÉ "],["Total commandes",orders.length],
    ["CA total (€)",orders.reduce((s,o)=>s+o.total,0).toFixed(2).replace(".",",")]);
  const pay={cash:0,carte:0,ticket:0};
  orders.forEach(o=>{pay[o.paymentMode]=(pay[o.paymentMode]||0)+o.total;});
  rows.push(["Cash (€)",pay.cash.toFixed(2).replace(".",",")],
    ["Carte (€)",pay.carte.toFixed(2).replace(".",",")],
    ["Ticket Resto (€)",pay.ticket.toFixed(2).replace(".",",")]);
  const prod={};
  orders.forEach(o=>o.items.forEach(i=>{
    if(!prod[i.name])prod[i.name]={qty:0,rev:0};
    prod[i.name].qty+=i.qty;prod[i.name].rev+=i.price*i.qty;
  }));
  rows.push([],[" VENTES PAR ARTICLE "],["Article","Qté vendue","CA (€)"]);
  Object.entries(prod).sort((a,b)=>b[1].qty-a[1].qty).forEach(([n,s])=>
    rows.push([n,s.qty,s.rev.toFixed(2).replace(".",",")]));
  const csv="\uFEFF"+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(";")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download="beyt_ventes_"+new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")+".csv";
  a.click();
}

            {order.paymentMode==="cash"&&
              <b style={{color:C.green}}> · Rendu {fmt(order.cashGiven-order.total)}</b>}
          </div>
        </div>
      </div>
      <div style={{padding:"16px 20px",display:"flex",gap:12,flexShrink:0}}>
        <button onClick={()=>doPrint(order)}

          Nouvelle commande

      </div>
    </>

}

/* ════════ PIN MODAL ════════ */
function PinModal({onSuccess,onCancel}) {
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const press=k=>{
    if(k==="del"){setPin(p=>p.slice(0,-1));return;}
    if(pin.length>=4)return;
    const next=pin+k;setPin(next);
    if(next.length===4){
      if(next===MANAGER_PIN)onSuccess();
      else{setErr(true);setTimeout(()=>{setPin("");setErr(false);},600);}
    }
  };
  return (
    <Overlay>
      <div style={{background:C.surface,borderRadius:28,padding:36,width:320,
        textAlign:"center",boxShadow:"0 24px 80px #00000040"}}>
        <div style={{fontSize:44,marginBottom:10}}>🔐</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.text,marginBottom:4}}>
          Accès Manager
        </div>
        <div style={{fontSize:13,color:C.muted,marginBottom:28}}>PIN par défaut : <b>{MANAGER_PIN}</b></div>
        <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:32,
          transform:err?"translateX(8px)":"none",transition:"transform 0.1s"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:18,height:18,borderRadius:"50%",
              background:pin.length>i?(err?"#ef4444":C.green):C.border,
              transition:"background 0.2s"}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
          {["1","2","3","4","5","6","7","8","9","","0","del"].map((k,i)=>(
            <button key={i} onClick={()=>k&&press(k)}
              style={{height:62,borderRadius:14,
                border:k?"1.5px solid "+C.border:"none",
                background:k==="del"?C.terraLt:k?C.bg:"transparent",
                color:k==="del"?C.terra:C.text,
                fontSize:k==="del"?20:22,fontWeight:800,
                cursor:k?"pointer":"default",opacity:k?1:0}}>
              {k==="del"?"⌫":k}
            </button>
          ))}
        </div>
        <button onClick={onCancel}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"1.5px solid "+C.border,
            background:"transparent",color:C.muted,cursor:"pointer",fontSize:15,fontWeight:700}}>
          Annuler
        </button>
      </div>
    </Overlay>
  );
}

/* ════════ MANAGER MODAL ════════ */
function ManagerModal({orders,onClose,onClearOrders}) {
  const [tab,setTab]=useState("history");

    ? orders.filter(o=>o.date===new Date(dateFilter).toLocaleDateString("fr-FR"))

  filtered.forEach(o=>o.items.forEach(i=>{

    prod[i.name].qty+=i.qty;prod[i.name].rev+=i.price*i.qty;

                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontWeight:900,color:i===0?C.gold:C.green,fontSize:16}}>

/* ════════ MAIN APP ════════ */
function BeytPOS() {
  const [unlocked,setUnlocked]=useState(false);
  const [cat,setCat]=useState(0);
  const [cart,setCart]=useState([]);
  const [orders,setOrders]=useState([]);
  const [sheet,setSheet]=useState(null);
  const [lastOrder,setLastOrder]=useState(null);

  useEffect(()=>{setOrders(loadOrders());},[]);

  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);

  const add=item=>setCart(prev=>{
    const ex=prev.find(i=>i.id===item.id);
    return ex?prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i):[...prev,{...item,qty:1}];
  });
  const dec=id=>setCart(prev=>{
    const ex=prev.find(i=>i.id===id);
    return ex.qty===1?prev.filter(i=>i.id!==id):prev.map(i=>i.id===id?{...i,qty:i.qty-1}:i);
  });

  const confirmPay=({mode,cashGiven})=>{
    const labels={cash:"💵 Cash",carte:"💳 Carte",ticket:"🎫 Ticket Resto"};
    const now=new Date();
    const order={num:padNum(orders.length),items:cart,total,
      paymentMode:mode,paymentLabel:labels[mode],cashGiven,
      date:now.toLocaleDateString("fr-FR"),
      time:now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})};
    const updated=[...orders,order];
    setOrders(updated);saveOrders(updated);
    setLastOrder(order);setCart([]);setSheet("success");
  };

  const clearOrders=()=>{setOrders([]);saveOrders([]);};

  if(!unlocked) return <AccessScreen onUnlock={()=>setUnlocked(true)}/>;

  return (
    <div style={{fontFamily:"'Nunito',sans-serif",background:C.bg,
      height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:"1.5px solid "+C.border,
        padding:"10px 16px",display:"flex",justifyContent:"space-between",
        alignItems:"center",flexShrink:0,boxShadow:"0 1px 12px #00000008"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:C.green,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🌿</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:18,color:C.text,lineHeight:1}}>Bey-T</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>Traiteur Libanais · Paris</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:C.greenLt,border:"1.5px solid #b8d4b8",borderRadius:10,
            padding:"6px 14px",fontSize:14,fontWeight:800,color:C.green}}>
            #{padNum(orders.length)}
          </div>
          <button onClick={()=>setSheet("pin")}
            style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid "+C.border,
              background:C.bg,color:C.text,fontWeight:700,fontSize:13,cursor:"pointer",
              display:"flex",alignItems:"center",gap:5}}>
            🔐 Manager
          </button>
        </div>
      </div>
      {/* TABS */}
      <div style={{display:"flex",gap:6,padding:"12px 14px",overflowX:"auto",
        background:C.surface,borderBottom:"1.5px solid "+C.border,flexShrink:0}}>
        {MENU.map((c,i)=>(
          <button key={i} onClick={()=>setCat(i)}
            style={{whiteSpace:"nowrap",padding:"10px 16px",borderRadius:99,border:"none",
              cursor:"pointer",fontWeight:700,fontSize:14,flexShrink:0,
              background:cat===i?C.green:C.bg,color:cat===i?"#fff":C.muted,
              boxShadow:cat===i?"0 2px 10px #5B7B5B33":"none",transition:"all 0.15s"}}>
            {c.cat}
          </button>
        ))}
      </div>
      {/* SUBTITLE */}
      <div style={{padding:"10px 16px 4px",flexShrink:0}}>
        <span style={{fontSize:12,color:C.muted,fontWeight:700}}>{MENU[cat].sub}</span>
      </div>
      {/* GRID */}
      <div style={{flex:1,overflowY:"auto",padding:"8px 14px",
        paddingBottom:count>0?"100px":"20px",
        display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",
        gap:10,alignContent:"start"}}>
        {MENU[cat].items.map(item=>{
          const inCart=cart.find(i=>i.id===item.id);
          return (
            <button key={item.id} onClick={()=>add(item)}
              style={{background:inCart?C.greenLt:C.surface,
                border:"2px solid "+(inCart?C.green:C.border),
                borderRadius:18,padding:"16px 14px 14px",
                cursor:"pointer",textAlign:"left",position:"relative",
                transition:"all 0.15s",
                boxShadow:inCart?"0 4px 18px #5B7B5B20":"0 2px 8px #00000008"}}>
              {item.vege&&(
                <div style={{position:"absolute",top:10,right:10,background:"#e8f5e8",
                  borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:800,color:C.green}}>V</div>
              )}
              {inCart&&(
                <div style={{position:"absolute",top:-10,left:-10,width:30,height:30,
                  borderRadius:"50%",background:C.green,color:"#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:14,fontWeight:900,boxShadow:"0 2px 10px #5B7B5B44"}}>
                  {inCart.qty}
                </div>
              )}
              <div style={{fontSize:15,fontWeight:700,color:C.text,
                marginBottom:10,lineHeight:1.3,paddingRight:item.vege?22:0}}>
                {item.name}
              </div>
              <div style={{fontSize:19,fontWeight:900,color:inCart?C.green:C.terra}}>
                {fmt(item.price)}
              </div>
            </button>
          );
        })}
      </div>
      {/* FLOATING CART */}
      {count>0&&(
        <div style={{position:"fixed",bottom:20,left:16,right:16,zIndex:200}}>
          <button onClick={()=>setSheet("cart")}
            style={{width:"100%",padding:"18px 24px",borderRadius:20,border:"none",
              background:C.green,color:"#fff",
              display:"flex",justifyContent:"space-between",alignItems:"center",
              cursor:"pointer",boxShadow:"0 8px 32px #5B7B5B55"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:"#ffffff33",borderRadius:99,width:32,height:32,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:15,fontWeight:900}}>{count}</div>
              <span style={{fontSize:17,fontWeight:800}}>Voir ma commande</span>
            </div>
            <span style={{fontSize:20,fontWeight:900}}>{fmt(total)}</span>
          </button>
        </div>
      )}
      {/* SHEETS */}
      <Sheet open={sheet==="cart"} onClose={()=>setSheet(null)}>
        <CartSheet cart={cart} add={add} dec={dec} total={total}
          onCheckout={()=>setSheet("payment")} onClose={()=>setSheet(null)}/>
      </Sheet>
      <Sheet open={sheet==="payment"} onClose={()=>setSheet("cart")}>
        <PaymentSheet total={total} onConfirm={confirmPay} onBack={()=>setSheet("cart")}/>
      </Sheet>
      <Sheet open={sheet==="success"} onClose={()=>setSheet(null)}>
        {lastOrder&&<SuccessSheet order={lastOrder} onClose={()=>setSheet(null)}/>}
      </Sheet>
      {sheet==="pin"&&<PinModal onSuccess={()=>setSheet("manager")} onCancel={()=>setSheet(null)}/>}
      {sheet==="manager"&&<ManagerModal orders={orders} onClose={()=>setSheet(null)} onClearOrders={clearOrders}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BeytPOS/>);
</script>
</body>
</html>
